openapi: "3.0.1"
info:
  title: Orders API
  description: Sample Orders API for APIM demo deployment
  version: "1.0.0"

paths:
  /orders:
    get:
      operationId: getOrders
      summary: List all orders
      description: Returns a list of all orders
      responses:
        "200":
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      summary: Create a new order
      description: Creates a new order in the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid request body

  /orders/{orderId}:
    get:
      operationId: getOrderById
      summary: Get order by ID
      description: Returns a single order by its ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
    put:
      operationId: updateOrder
      summary: Update an order
      description: Updates an existing order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "200":
          description: Order updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
    delete:
      operationId: deleteOrder
      summary: Delete an order
      description: Deletes an order by its ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Order deleted successfully
        "404":
          description: Order not found

components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: string
          example: "ord-12345"
        customerName:
          type: string
          example: "John Doe"
        product:
          type: string
          example: "Widget Pro"
        quantity:
          type: integer
          example: 3
        totalPrice:
          type: number
          format: double
          example: 59.97
        status:
          type: string
          enum:
            - pending
            - processing
            - shipped
            - delivered
          example: "pending"
        createdAt:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required:
        - customerName
        - product
        - quantity
      properties:
        customerName:
          type: string
          example: "John Doe"
        product:
          type: string
          example: "Widget Pro"
        quantity:
          type: integer
          minimum: 1
          example: 3
