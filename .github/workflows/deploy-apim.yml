name: Deploy API

on:
  workflow_dispatch:    # Manual trigger only (for demo)
  # Uncomment below to enable automatic triggers:
  # push:
  #   branches:
  #     - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Set environment
      run: |
        if [[ "${GITHUB_REF##*/}" == "main" ]]; then
          echo "APIM_NAME=${{ secrets.APIM_PROD }}" >> $GITHUB_ENV
        else
          echo "APIM_NAME=${{ secrets.APIM_DEV }}" >> $GITHUB_ENV
        fi

    - name: Deploy API
      run: |
        az apim api import \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --service-name $APIM_NAME \
          --api-id orders-api \
          --path orders \
          --display-name "Orders API" \
          --specification-format OpenApi \
          --specification-path openapi.yaml