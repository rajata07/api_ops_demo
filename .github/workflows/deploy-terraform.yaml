# ─────────────────────────────────────────────────────────────────────────
# Reusable Terraform Deploy Workflow
# ─────────────────────────────────────────────────────────────────────────
# This is the "common CI/CD template" from the best practices slides.
# In a real org, this lives in a SEPARATE repo (e.g. contoso/shared-workflows)
# and is versioned with git tags (v1.0, v2.0).
#
# Product teams call this with:
#   uses: contoso/shared-workflows/.github/workflows/deploy-terraform.yaml@v1.0
#
# Here it's in the same repo for demo purposes.
# ─────────────────────────────────────────────────────────────────────────

name: Reusable — Terraform Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev, prod)"
        required: true
        type: string
      working_directory:
        description: "Path to Terraform root module"
        required: true
        type: string
      tf_var_file:
        description: "Path to .tfvars file (relative to working_directory)"
        required: true
        type: string
      terraform_version:
        description: "Terraform version to use"
        required: false
        type: string
        default: "1.9.0"
      plan_only:
        description: "If true, only run plan (no apply). Used for PR checks."
        required: false
        type: boolean
        default: false

jobs:
  terraform:
    name: Terraform (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.plan_only && '' || inputs.environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Terraform Init
      run: terraform init

    - name: Select Workspace
      run: terraform workspace select ${{ inputs.environment }} || terraform workspace new ${{ inputs.environment }}

    - name: Terraform Plan
      id: plan
      run: terraform plan -var-file=${{ inputs.tf_var_file }} -out=tfplan -input=false

    - name: Terraform Apply
      if: ${{ !inputs.plan_only }}
      run: terraform apply -auto-approve tfplan
